<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>티켓베이 CX 콘솔</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#fff;
  --g1:#1a1a1a;--g2:#333;--g3:#555;--g4:#888;--g5:#bbb;--g6:#e0e0e0;--g7:#f2f2f2;--g8:#f8f8f8;
  --border:#e8e8e8;--border2:#d4d4d4;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--g8);color:var(--black);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:14px}

/* ── 레이아웃 */
.shell{display:flex;height:100vh}

/* ── 사이드바 */
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sb-logo{width:26px;height:26px;background:var(--black);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-title{font-size:13px;font-weight:700;color:var(--black);letter-spacing:-.02em}
.sb-sub{font-size:10px;color:var(--g4)}
.sb-status{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--g8);border-radius:8px;border:1px solid var(--border)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--g5);flex-shrink:0;transition:background .3s}
.sb-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.sb-badge.ba{background:#fff8ed;color:#92400e;border:1px solid #fcd98a}
.sb-badge.bg{background:var(--black);color:#fff}
.sb-badge.br{background:#fff1f1;color:#991b1b;border:1px solid #fca5a5}
.sb-hist-label{font-size:10px;color:var(--g5);letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:10px 14px 4px}
.hl{flex:1;overflow-y:auto;padding:4px 8px}
.hl::-webkit-scrollbar{width:0}
.hi{padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .1s}
.hi:hover{background:var(--g8)}
.hi.on{background:var(--g7);border-color:var(--border)}
.him{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hit{font-size:10px;color:var(--g4)}
.hiq{font-size:12px;color:var(--g2);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sb-divider{height:1px;background:var(--border);margin:4px 10px}
.sb-nav{padding:6px 8px}
.sb-nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--g3);font-family:inherit;font-size:12px;width:100%;text-align:left;transition:all .1s;font-weight:500}
.sb-nav-btn:hover{background:var(--g8);color:var(--black)}
.sb-user{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-uname{font-size:12px;color:var(--g2);font-weight:500}
.sb-ver{font-size:10px;color:var(--g5);margin-left:auto;white-space:nowrap}

/* ── 메인 */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--g8)}
.content-nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:44px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-btns{display:flex;gap:6px}
.nav-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--g8);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;color:var(--g2);cursor:pointer;font-family:inherit;transition:all .1s}
.nav-btn:hover{background:var(--g7);color:var(--black);border-color:var(--border2)}
.nav-title{font-size:11px;color:var(--g4);font-weight:500;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ra{flex:1;overflow-y:auto;padding:22px 26px}
.ra::-webkit-scrollbar{width:4px}
.ra::-webkit-scrollbar-thumb{background:var(--g6);border-radius:2px}

/* ── 홈 화면 ── */
.home-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 0}
.home-icon{font-size:34px;margin-bottom:10px}
.home-title{font-size:18px;font-weight:700;color:var(--black);margin-bottom:24px;letter-spacing:-.02em}
.home-section{width:100%;max-width:640px;margin-bottom:22px}
.home-label{font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.folders-row{display:flex;flex-wrap:wrap;gap:10px}
.freq-search-row{display:flex;flex-wrap:wrap;gap:7px}
.freq-btn{padding:6px 14px;border-radius:20px;border:1.5px dashed var(--border2);background:var(--white);color:var(--g3);font-family:inherit;font-size:12px;cursor:pointer;font-weight:500;transition:all .1s}
.freq-btn:hover{border-color:var(--g3);color:var(--black)}
.quick-row{display:flex;flex-wrap:wrap;gap:6px}
.qb{font-size:12px;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--white);color:var(--g2);cursor:pointer;font-weight:500;font-family:inherit;transition:all .1s}
.qb:hover{background:var(--black);color:#fff;border-color:var(--black)}

/* ── 케이스 목록 ── */
.case-list{display:flex;flex-direction:column;gap:7px}
.case-btn{display:block;width:100%;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--black);text-align:left;font-weight:500;transition:all .1s}
.case-btn:hover{background:var(--g8);border-color:var(--border2)}
.back-btn{display:flex;align-items:center;gap:5px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--g3);margin-bottom:16px;padding:0}
.back-btn:hover{color:var(--black)}
.list-title{font-size:16px;font-weight:700;color:var(--black);margin-bottom:5px;letter-spacing:-.02em}
.list-sub{font-size:13px;color:var(--g4);margin-bottom:16px}

/* ── 쿼리 카드 ── */
.qcard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:15px 19px;margin-bottom:16px}
.qlabel{font-size:10px;color:var(--g5);margin-bottom:5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.qtext{font-size:15px;color:var(--black);line-height:1.6;font-weight:700;letter-spacing:-.02em}

/* ── 탭 ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;font-size:12px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--g4);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab:hover:not(.on){color:var(--g2)}
.tab.on{color:var(--black);border-bottom-color:var(--black);font-weight:700}

/* ── 처리방안 및 카드 ── */
.steps{display:flex;flex-direction:column;gap:8px}
.step-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px 17px;display:flex;gap:13px;align-items:flex-start;margin-bottom:8px;}
.step-num{min-width:26px;height:26px;border-radius:7px;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step-title{font-size:14px;font-weight:700;color:var(--black);margin-bottom:4px;}
.step-desc{font-size:13px;color:var(--g2);line-height:1.8}
.reason-card{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--black);padding:16px 20px;border-radius:0 12px 12px 0;font-size:13px;line-height:1.9}
.script-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;white-space:pre-wrap;line-height:1.8}

/* ── 입력창 ── */
.ia{border-top:1px solid var(--border);padding:12px 18px 16px;background:var(--white);flex-shrink:0}
.iw{display:flex;gap:9px;align-items:flex-end;background:var(--g8);border:1.5px solid var(--border2);border-radius:12px;padding:10px 13px;transition:all .15s}
.iw:focus-within{border-color:var(--black);background:var(--white);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.iw textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:inherit;font-size:13px;color:var(--black);line-height:1.65}
.iw textarea::placeholder{color:var(--g5)}
.sbtn{padding:8px 18px;background:var(--black);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .1s}
.sbtn:disabled{background:var(--g6);cursor:not-allowed}
.hint{font-size:11px;color:var(--g5);margin-top:7px}
.hint kbd{padding:1px 5px;background:var(--g7);border:1px solid var(--border2);border-radius:4px;font-size:10px;color:var(--g4);font-family:inherit}

/* ── 지식베이스 패널 ── */
.kb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:100}
.kb-overlay.open{display:flex;align-items:flex-start;justify-content:flex-end}
.kb-panel{width:480px;height:100vh;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.kb-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kb-body{flex:1;overflow-y:auto;padding:16px}
.kb-tabs{display:flex;gap:1px;margin-bottom:14px;background:var(--g7);border-radius:8px;padding:3px}
.kb-tab{flex:1;padding:6px;font-size:12px;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--g4);border-radius:6px;text-align:center;font-weight:500;}
.kb-tab.on{background:var(--white);color:var(--black);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kb-item{background:var(--g8);border:1px solid var(--border);border-radius:9px;padding:9px 12px;margin-bottom:5px;display:flex;gap:7px;align-items:flex-start}
.kb-tag{font-size:10px;color:var(--g3);background:var(--white);border:1px solid var(--border);border-radius:4px;padding:2px 6px;white-space:nowrap;font-weight:600;flex-shrink:0}
.kb-txt{flex:1;font-size:12px;color:var(--g2);line-height:1.6}

/* ── 대량 추가 기능 스타일 ── */
.bulk-ta{width:100%;padding:9px 11px;border:1.5px solid var(--border2);border-radius:8px;font-family:inherit;font-size:12px;color:var(--black);background:var(--white);outline:none;resize:vertical;min-height:120px;line-height:1.65;margin-bottom:8px;}
.bulk-ta:focus{border-color:var(--black)}
.bulk-btn{width:100%;padding:9px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;}
.bulk-btn:disabled{background:var(--g6);cursor:not-allowed}
.parsing-row{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:13px;color:var(--g4)}

/* ── API 모달 ── */
.cfg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;align-items:center;justify-content:center}
.cfg-overlay.open{display:flex}
.cfg-box{background:var(--white);border-radius:14px;padding:24px;width:400px;box-shadow:0 16px 48px rgba(0,0,0,.14)}
.cfg-inp{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:9px;font-family:inherit;font-size:13px;outline:none;margin-bottom:13px;background:var(--g8)}

/* ── 연관질문 (채팅창) ── */
.follow-box{margin-top:16px;background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.follow-hd{padding:10px 14px;background:var(--g8);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.follow-msgs{padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto}
.follow-msgs::-webkit-scrollbar{width:3px}
.follow-msgs::-webkit-scrollbar-thumb{background:var(--g6);border-radius:2px}
.fmsg{padding:10px 14px;font-size:13px;line-height:1.8;max-width:85%;word-break:keep-all}
.fmsg-user{background:var(--black);color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px}
.fmsg-ai{background:var(--g8);color:var(--black);align-self:flex-start;max-width:94%;border-radius:4px 16px 16px 16px;border:1px solid var(--border)}
.fmsg-loading{padding:10px 14px;font-size:13px;color:var(--g4);display:flex;align-items:center;gap:8px;background:var(--g8);border-radius:4px 16px 16px 16px;align-self:flex-start;border:1px solid var(--border)}
.follow-inp-wrap{padding:10px 12px;border-top:1px solid var(--border);background:var(--white)}
.follow-inp{display:flex;gap:8px;align-items:flex-end;background:var(--g8);border:1.5px solid var(--border2);border-radius:10px;padding:8px 12px;transition:all .15s}
.follow-inp:focus-within{border-color:var(--black);background:var(--white)}
.follow-inp textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:inherit;font-size:13px;color:var(--black);line-height:1.6}
.follow-inp textarea::placeholder{color:var(--g5)}
.follow-inp-btn{padding:6px 13px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.ftoggle-row{display:flex;gap:6px;padding:6px 2px 0}
.ftoggle{padding:5px 11px;border:1.5px solid var(--border2);background:var(--white);font-family:inherit;font-size:11px;font-weight:600;color:var(--g4);border-radius:16px;cursor:pointer;transition:all .12s}
.ftoggle.on{background:var(--black);color:#fff;border-color:var(--black)}

/* ── 정보 저장 패널 ── */
.fadd-panel{display:none;padding:12px 14px;border-top:1px solid var(--border);background:var(--g8)}
.fadd-inp{width:100%;padding:7px 10px;border:1.5px solid var(--border2);border-radius:7px;font-family:inherit;font-size:12px;outline:none;background:var(--white);color:var(--black);margin-bottom:6px}
.fadd-ta{width:100%;padding:7px 10px;border:1.5px solid var(--border2);border-radius:7px;font-family:inherit;font-size:12px;outline:none;resize:none;line-height:1.65;background:var(--white);color:var(--black)}
.fadd-save{margin-top:7px;padding:7px 16px;background:var(--black);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── 귀여운 로딩 애니메이션 ── */
.cute-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:var(--white);border:2px dashed var(--border2);border-radius:16px;text-align:center;margin-top:10px}
.cute-loader-icons{font-size:32px;margin-bottom:12px;display:flex;gap:12px}
.cute-loader-icons span{display:inline-block;animation:catBounce .6s infinite alternate}
.cute-loader-icons span:nth-child(2){animation-delay:.2s}
.cute-loader-icons span:nth-child(3){animation-delay:.4s}
@keyframes catBounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.cute-loader-text{font-size:15px;font-weight:700;color:var(--black);margin-bottom:6px}
.cute-loader-sub{font-size:13px;color:var(--g4)}

.error-card{background:#fff1f1;border:1px solid #fca5a5;border-left:4px solid #ef4444;border-radius:0 12px 12px 0;padding:16px 20px;font-size:13px}

/* ── 지식베이스 카테고리 그룹 ── */
.kb-cat-group{margin-bottom:8px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white)}
.kb-cat-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;background:var(--g8);border-bottom:1px solid transparent;transition:all .12s}
.kb-cat-hd:hover{background:var(--g7)}
.kb-cat-hd.open{border-bottom-color:var(--border)}
.kb-cat-arrow{font-size:10px;color:var(--g4);transition:transform .2s;flex-shrink:0}
.kb-cat-hd.open .kb-cat-arrow{transform:rotate(90deg)}
.kb-cat-name{font-size:12px;font-weight:700;color:var(--black);flex:1}
.kb-cat-cnt{font-size:10px;color:var(--g5);background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-weight:600}
.kb-cat-body{display:none;padding:6px}
.kb-cat-hd.open+.kb-cat-body{display:block}
.kb-cat-actions{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.kb-cat-actions button{padding:2px 6px;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:var(--white);font-size:10px;color:var(--g3);font-family:inherit;transition:all .1s}
.kb-cat-actions button:hover{border-color:var(--g3);color:var(--black)}
.kb-cat-select{padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:10px;font-family:inherit;background:var(--white);color:var(--g2);cursor:pointer;outline:none;max-width:90px}
.kb-new-cat-row{display:flex;gap:6px;margin-bottom:10px}
.kb-new-cat-inp{flex:1;padding:7px 10px;border:1.5px solid var(--border2);border-radius:8px;font-family:inherit;font-size:12px;outline:none}
.kb-new-cat-inp:focus{border-color:var(--black)}
.kb-new-cat-btn{padding:7px 14px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── 케이스 정리 ── */
.digest-wrap{max-width:700px;margin:0 auto;padding:20px 0}
.digest-title{font-size:17px;font-weight:700;color:var(--black);margin-bottom:4px;letter-spacing:-.02em}
.digest-sub{font-size:12px;color:var(--g4);margin-bottom:16px;line-height:1.6}
.digest-ta{width:100%;min-height:180px;padding:14px;border:1.5px solid var(--border2);border-radius:12px;font-family:inherit;font-size:13px;color:var(--black);background:var(--white);outline:none;resize:vertical;line-height:1.7}
.digest-ta:focus{border-color:var(--black);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.digest-ta::placeholder{color:var(--g5)}
.digest-attach{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.digest-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.digest-thumb img{width:100%;height:100%;object-fit:cover}
.digest-thumb-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.digest-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
.digest-file-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;background:var(--white);border:1.5px solid var(--border2);border-radius:9px;font-size:12px;font-weight:600;color:var(--g3);cursor:pointer;font-family:inherit;transition:all .1s}
.digest-file-btn:hover{border-color:var(--g3);color:var(--black)}
.digest-go-btn{padding:8px 22px;background:var(--black);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:auto}
.digest-go-btn:disabled{background:var(--g6);cursor:not-allowed}

/* ── 글로벌 CS ── */
.gcs-wrap{max-width:700px;margin:0 auto;padding:20px 0}
.gcs-lang-row{display:flex;gap:6px;margin-bottom:14px}
.gcs-lang{padding:7px 16px;border:1.5px solid var(--border2);background:var(--white);font-family:inherit;font-size:12px;font-weight:600;color:var(--g4);border-radius:20px;cursor:pointer;transition:all .12s}
.gcs-lang:hover{border-color:var(--g3);color:var(--black)}
.gcs-lang.on{background:var(--black);color:#fff;border-color:var(--black)}
.gcs-quick-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.gcs-quick{padding:5px 12px;border:1px dashed var(--border2);background:var(--white);font-family:inherit;font-size:11px;color:var(--g3);border-radius:16px;cursor:pointer;transition:all .1s}
.gcs-quick:hover{border-color:var(--g3);color:var(--black);border-style:solid}
.gcs-result{margin-top:16px;background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.gcs-result-hd{padding:10px 16px;background:var(--g8);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.gcs-result-lang{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.04em;text-transform:uppercase}
.gcs-result-copy{padding:4px 12px;background:var(--black);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.gcs-result-copy:hover{opacity:.85}
.gcs-result-body{padding:16px;font-size:13px;line-height:1.9;color:var(--g2);white-space:pre-wrap}
.gcs-kr-toggle{width:100%;padding:9px 16px;background:var(--g8);border:none;border-top:1px solid var(--border);font-family:inherit;font-size:12px;font-weight:600;color:var(--g3);cursor:pointer;text-align:left;transition:all .1s}
.gcs-kr-toggle:hover{background:var(--g7);color:var(--black)}
.gcs-kr-body{padding:16px;font-size:13px;line-height:1.9;color:var(--g4);white-space:pre-wrap;border-top:1px solid var(--border);background:var(--g8)}

/* ── 해석 ── */
.tr-wrap{max-width:700px;margin:0 auto;padding:20px 0}
.tr-row{display:flex;gap:12px;margin-bottom:10px}
.tr-col{flex:1;display:flex;flex-direction:column}
.tr-label{font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.tr-ta{width:100%;min-height:160px;padding:12px;border:1.5px solid var(--border2);border-radius:10px;font-family:inherit;font-size:13px;color:var(--black);background:var(--white);outline:none;resize:vertical;line-height:1.7}
.tr-ta:focus{border-color:var(--black);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.tr-ta::placeholder{color:var(--g5)}
.tr-ta[readonly]{background:var(--g8);color:var(--g2);cursor:default}
.tr-mid{display:flex;align-items:center;justify-content:center;flex-shrink:0;padding-top:20px}
.tr-swap{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s}
.tr-swap:hover{border-color:var(--black);background:var(--g8)}
.tr-actions{display:flex;gap:8px;align-items:center}
.tr-copy{padding:5px 12px;background:var(--white);border:1.5px solid var(--border2);border-radius:7px;font-size:11px;font-weight:600;color:var(--g3);cursor:pointer;font-family:inherit;transition:all .1s}
.tr-copy:hover{border-color:var(--g3);color:var(--black)}
.digest-result{margin-top:20px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;font-size:13px;line-height:1.9;color:var(--g2)}
.digest-result h3{font-size:14px;font-weight:700;color:var(--black);margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.digest-result h3:first-child{margin-top:0}
.digest-result table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.digest-result th{background:var(--g8);text-align:left;padding:7px 10px;border:1px solid var(--border);font-weight:700;color:var(--black);font-size:11px}
.digest-result td{padding:7px 10px;border:1px solid var(--border);color:var(--g2)}
.digest-result .summary-line{margin-top:14px;padding:10px 14px;background:var(--g8);border-radius:8px;font-weight:600;color:var(--black);font-size:13px;border-left:3px solid var(--black)}
</style>
</head>

// ── 시스템 변수 및 키값 유지 (데이터 증발 방지) ── //

var hist = [], activeId = null, activeTab = '처리방안', loading = false;

var EXCEPTION_CASES = [
  '보이스피싱 지급정지. 신분증 명의와 회원명 불일치',
  '정가이하 수수료 악용 의심. 출금 정지 후 증빙 요청',
  '기타거래 현금화 악용 회원. 거래취소 요청 들어옴',
  '입장안심서비스 보상 신청 건이 거래보류 처리되어 있음',
  '무료티켓 지속 판매자 판매제한 후 탈퇴 요청',
  '청약철회법 근거로 결제 15분 후 취소 요구',
  '소보원 접수건. 판매자·구매자 양측 과실'
];
var TICKET_CASES = [
  'BTS 티켓 판매 등록 건 처리 방법',
  '시즌권 판매 등록 모니터링됨',
  '좌석 열 임의표기 허용 기준',
  '입장안심서비스 거래 중 보류 오처리'
];
var QUICK_NORMAL = [
  '판매자 취소 보상 쿠폰 만료됐다고 강성 민원',
  '야구 예매처 4매+구단 4매, 총 몇 매까지?',
  '해외 체류 판매자 본인인증 불가, 패널티 면제 요청',
  'PIN거래 방법',
  '로그인 안돼요'
];

var SYS = '당신은 티켓베이 CX 운영 전문가입니다. 입력에 따라 두 가지 모드로 응답합니다.\n\n=== 응대멘트 작성 톤 규칙 (최우선 준수) ===\n■ 전체 톤: 정중하되 딱딱하지 않고, 따뜻하되 과하지 않은 고객센터 문어체.\n■ 구어체 금지: ~이에요, ~거든요, ~할게요, ~드릴게요, 미안한 말씀이에요 등 절대 사용 금지.\n■ 종결어미: ~합니다, ~드립니다, ~안내드립니다, ~부탁드립니다, ~가능합니다 사용.\n■ 부정 표현은 완곡하게: \"불가능합니다/안 됩니다\" 대신 \"어려운 점 안내드립니다\" 사용.\n■ 구조: 공감 인사(1줄) → 핵심 안내 → 예외/대안 → 마무리 인사(1줄).\n■ 항목 나열 시 \"* 항목명: 설명\" 불릿 형식 사용 (첫째/둘째 금지).\n■ 과잉 감정 금지: ㅠㅠ, 정말 너무, 진심으로 등 사용하지 않음.\n■ 게시판/전화 멘트 모두 동일한 톤. 전화라고 구어체 쓰지 않음.\n\n[좋은 응대멘트 전체 예시]\n이용에 불편을 드려 죄송합니다.\\n결제 완료 후 단순 변심에 의한 취소는 경과 시간과 관계없이 티켓베이 정책상 어려운 점 안내드립니다.\\n다만, 아래의 경우에 한하여 취소가 가능합니다.\\n* 판매자 과실: 상품 미전달, 상품 정보 상이(오류) 등\\n* 불가피한 사유: 공연 취소, 천재지변 등\\n현재 문의 주신 내용이 위 사유에 해당하지 않는 경우, 재판매 이용을 권장드립니다. 재판매 시 별도의 수수료는 발생하지 않으며, 새로운 구매자를 통해 거래를 진행하실 수 있습니다.\\n재판매 관련 상세 절차는 고객센터 1:1 문의를 통해 안내받으실 수 있습니다.\\n이용에 참고 부탁드리며, 너른 양해 부탁드립니다.\n\n[나쁜 예시 - 이렇게 쓰면 안 됨]\n정말 미안한 말씀이에요. 취소는 불가능합니다. 첫째, 판매자 과실인 경우... 둘째, 공연 취소인 경우...\n\n위 좋은 예시의 구조와 어감을 반드시 따라 작성하세요.\n\n=== 답변 형식 ===\n순수 JSON만 출력. 백틱 코드블록 절대 금지.\n모드 "케이스": {"모드":"케이스","처리방안":"1|제목|설명\\n2|제목|설명","이유":"근거 2~3줄","니즈파악":["항목1","항목2"],"위험도":"높음|중간|낮음","슬랙참조":"관련 케이스","정책근거":"정책 한줄","응대멘트":{"게시판":"(좋은 예시와 동일한 톤/구조로 작성한 고객 응대문. 공감인사로 시작, 양해인사로 마무리, 불릿 사용)","전화":"(게시판과 동일 톤. 구어체 절대 금지)"}}\n모드 "검색": {"모드":"검색","결과":[{"제목":"항목 제목","내용":"설명 2~4문장"}]}';

var BUILTIN = [
  {tag:'상품 등록 및 수량/가격 규정', content:'판매 수량 초과 시 정보 수정 불가(삭제 후 재등록). 허용 매수 조정 시 수정 가능. 티켓베이 판매 매수는 예매처 1인당 구매 가능 매수와 동일(25.12.01 시행). 판매 단가는 1,000원~999,900원(1매당 100만 원 미만). 게시 기간 6개월. 배송비는 무조건 판매자 부담(추가금 요구 불가).'},
  {tag:'판매 불가 및 직거래 유도', content:'판매 불가: 철도 탑승권, 습득물, 게임 월 결제, 개인정보 기재, 무료/초대권, 좌석 이동 목적(입장 불가), 이동 실패 환불 불가 상품(무통보 삭제 및 제한). 직거래 유도: 별도 계좌 입금 시 할인, 일부 금액 송금, 흥정, 구매 전 연락 유도, SNS/URL 기재 금지. 2회 적발 시 자격 제한. 직거래 피해는 당사자 책임.'},
  {tag:'거래 취소/페널티/구매자 보상', content:'결제 완료 후 단순 변심 취소 불가. 구매 거부 시 재판매 권장(재판매 시 수수료 무료, 카테고리 수정 불가). 천재지변/공연 취소 시에만 일괄 취소. 판매자 과실(상품 미전달, 정보 오류, 직접 취소) 시 판매 금액의 30% 페널티 부과. 이 페널티 30% 전액은 피해 구매자에게 보상 쿠폰으로 즉시 지급(발급일로부터 3개월 이내 구매 시 사용).'},
  {tag:'환불 소요 및 예치금 출금', content:'신용/체크카드 당일 취소는 즉시, 익일 취소는 3~5(6)영업일 소요. 휴대폰 결제 익월 취소 시 요금 청구 후 예치금 환불. 무통장 취소 시 예치금 즉시 환불. 예치금은 본인 명의 계좌/카카오페이로 수수료 없이 출금(다음 날 평일 오후 2시/3시 입금). 매일 23~01시 계좌 등록 불가. 최소 200원 이상 복합 결제 가능.'},
  {tag:'수수료 및 팬파워/쿠폰', content:'수수료: 콘서트/스포츠/연극뮤지컬은 판매 대금의 10%. 정가 이하 및 영화/전시/숙박/여행/굿즈 등은 무료. 팬파워: 거래 완료 시 판/구매자 모두 0.3% 적립(정가 이하 등 제외), 다음 해 12월 31일 자동 소멸, 쿠폰 교환 가능. 쿠폰은 유효기간 내 취소 시 재발급. 경품 5만 원 초과 시 제세공과금 22% 부과.'},
  {tag:'무통장 입금/현금영수증', content:'정가 이하 상품은 무통장 입금만 가능. 대기 시간 10분. 일일 미입금 취소 가능 횟수 1회 제한(자정 해제, 판매자 취소 시 차감 안 됨). 현금영수증 미신청 시 자진 발급(010-000-1234) 처리, 소득공제 받으려면 고객센터에서 승인 번호 확인 후 홈택스에서 직접 등록 필수.'},
  {tag:'티켓 전달/모바일/스마트 티켓', content:'지류 티켓 등기 배송 권장. 인터파크 배송 조회 업체명은 \'국제택배\'. 인터파크 모바일 티켓: PIN 확인 후 앱에 입력, 24시간 내 등록 안 하면 회수. 티켓링크/스마트 티켓: 010 실제 번호로만 선물 가능, MMS 수신 불가 기기 유의(바코드 없어도 번호로 이용 가능).'},
  {tag:'구매 확정/안심번호', content:'결제 시 0502 안심번호 자동 발급(상대 안심번호로 연락 시 내 번호 노출, 거래 후 해지). 직접 구매 확정 시 판매자에게 즉시 송금. 자동 확정: 사용 일시 지났으나 구매 확정 안 할 시 공연 다음 날 낮 12시 이후 자동 확정(사전 전달 완료 상태여야 함). 야구 등 스포츠는 경기 종료 후 구매 확정 안내.'},
  {tag:'입장 안심 서비스 보상 절차', content:'결제 시점 신청 가능(콘서트, 스포츠, 뮤지컬/연극 대상). 입장 거부 후 1시간 내 1:1 문의로 증빙(관람자 얼굴 포함 도착 사진, 신분증, 티켓) 접수. 7일 내 본인 부담으로 티켓베이(서울 강남구 봉은사로86길 6, 9층 902호)로 실물 티켓 발송. 수령 후 15일 이내 심사/보상.'},
  {tag:'회원 가입/탈퇴', content:'만 14세 이상 본인 인증 필수(1인 1계정). 비회원 구매 불가. 탈퇴: 진행 중 거래나 예치금 없어야 가능, 혜택 즉시 파기. 재가입: 탈퇴 후 일반 회원(이메일)으로 즉시 가능(법률에 따라 5년 보존되어 기존 계정으로 연결됨).'},
  {tag:'기타 이용 안내', content:'원활한 상담을 위해 13~14자리 상품번호 확인 필수. 상품 비교 담기는 30일간 최대 5개, 최근 본 상품은 7일간 최대 30개 보관. 결제 전 판매자 연락처 확인 불가, 문의는 고객센터 1:1 게시판 이용.'},
  // ── 글로벌 서비스 ── //
  {tag:'[글로벌] 로그인/회원가입/인증', content:'로그인: 이메일(전체국가), Google·Apple(중국어 설정 시 미제공), LINE(4월 초 예정, 중국어 미제공). 회원가입: 이메일·비밀번호·이름·약관 필수, 만 16세 이상, 이메일 인증만(별도 본인인증 없음), 1인 N개 계정 가능. ID 찾기 미지원, PW 찾기는 ID+이름 일치 → 이메일 인증. 이메일(ID)·이름 변경 불가. 이메일 인증 일일 5회 한도(초과 시 당일 불가, 성공 시 리셋). 주문 전 본인인증 5회 연속 실패 → 당일 주문 불가, 인증 후 30분 유효. SMS 인증 지원국: 중국·홍콩·일본·싱가포르·태국·대만·미국(그 외 이메일만).'},
  {tag:'[글로벌] 결제 수단/환율', content:'Credit Card: 전체 국가. PayPal: 중국 외 전체. WeChat Pay: 중국. AliPay: 중국·홍콩. 환율 매일 한국시간 오전 11시 업데이트, 결제 통화 USD, 결제 후 변경 불가. 결제 시점 금액 변동 가능(사전 고지됨).'},
  {tag:'[글로벌] 거래방식 개요', content:'4가지 거래방식: ①내방 픽업(Office Pickup) ②현장 픽업(On-site Pickup) ③해외 배송(Deliver to Residence) ④PIN 거래(PIN/Other). 거래방식은 판매자 등록 결과에 따라 노출 옵션이 다르며, 모든 방식이 항상 선택 가능한 것은 아님.'},
  {tag:'[글로벌] 내방 픽업', content:'구매자가 티켓베이 한국 사무실 방문 수령. 스케줄 변경: 픽업 전일 23:59까지 가능(당일 불가). 변경 경로: 주문서 상세 → Change Pickup Schedule. 전달준비(Ready to Send) 상태에서 수령확인(Received) 버튼 노출. 진행흐름: 판매자 발송 → TB 수신확인 → 방문일정 안내(SNS) → 스케줄 확정(D-1) → 사무실 방문수령 → 수령확인 처리. CS포인트: 픽업 날짜 변경 요청, 방문했는데 티켓 못 받음, 스케줄 변경 버튼 미노출.'},
  {tag:'[글로벌] 현장 픽업', content:'공연 당일 공연장 인근에서 판매자와 직접 만남. 공연일 전 수령 일시·장소 안내 발송. 연락: Order Q&A(주문서 내). Ready to Send → Received 버튼 노출. 진행흐름: 판매자 발송 → TB 수신확인 → 수령안내(SNS) → 장소·시간 안내(D-2) → 스케줄 확정(D-1) → 현장 티켓전달 → 수령확인 처리. CS포인트: 수령 장소·시간 모름, 판매자 미출현, 판매자 직접 연락 요청.'},
  {tag:'[글로벌] 해외 배송', content:'DHL 국제배송. 배송비 150 USD(결제 시 함께 결제). 소요 최대 21일(국가·지역별 상이). 공연일까지 21일 이상 필요. 관세 국가별 상이(DHL 별도 안내), 통관번호 필요할 수 있음. 배송지 변경: Ready to Send 이전까지만 가능. 송장번호 등록 시 Track Shipment 노출. 진행흐름: 결제완료 → 판매자 발송 → TB 검수 → 구매자 재배송 → 수령. CS포인트: 배송지 오입력, 배송 추적 불가, 배송 중 분실·파손, 공연일 21일 미만 배송 요청.'},
  {tag:'[글로벌] PIN 거래/직거래 유도', content:'PIN번호 또는 PDF 등 전자티켓 전달. 확인: MY티켓베이 → PIN번호함(판매자 전달 즉시 확인, Unread 카운트 증가). 사용법: 공연 당일 티켓부스/키오스크에서 발권(예매내역서 다운로드 + 예매자 전화번호 끝 4자리 필요). CS포인트: PIN 번호 미표시, PIN 발권 불가. 직거래 유도 해당행위: 플랫폼 외 계좌 입금 할인 제안, 연락처 교환·외부 메신저 이동, 외부 결제 링크 전달, 금액 일부 별도 송금. 대응: 즉시 거래 중단 안내 → 메시지 캡처 보관(삭제 금지) → help@ticketbayglobal.com 신고 → 직거래 시 보호정책 미적용·계정 제한 고지.'},
  {tag:'[글로벌] 거래 단계/주문 상태', content:'결제완료(Payment Completed): 주문 정상 접수. 전달준비(Ready to Send): 판매자→TB 전달 완료/TB 검수 중. 상품전달(Delivered/Shipping): TB→구매자 발송 또는 전달 중(배송 추적·픽업 준비). 상품수령(Received): 구매자 수령 확인(Received 버튼 클릭). 구매확정(Completed): 거래 종료·판매자 대금 지급(Confirm Purchase 버튼 또는 자동). 취소(Canceled): 거래 취소·환불 대기. 주의: "전달준비=판매자→TB", "상품전달=TB→구매자"로 안내.'},
  {tag:'[글로벌] 구매확정', content:'의미: 거래 종료·판매자 대금 지급. 수동확정: 티켓 수령 후 또는 입장 완료 후. 자동확정: 공연 다음 날 12시부터 순차 처리. 취소: 불가(완료 후 철회 없음). 경로: MY티켓베이 → 구매한 상품 → 거래 진행. 실수로 눌렀을 시 즉시 help@ticketbayglobal.com 문의. CS포인트: 구매확정 실수 클릭, 구매확정 버튼 미노출.'},
  {tag:'[글로벌] 취소 정책', content:'구매자 변심 취소: 불가. 판매자 취소 발생 시: 대체 티켓 또는 전액 환불 선택. 대체 티켓 조건: 공연일까지 7일 이상·해외배송 불가. 공연 공식 취소: 자동 전액 환불 처리. 결제 후 단순 변심 취소 없음 명확 안내 필수. CS포인트: 구매자 변심 취소 요청, 판매자 취소 연락, 공연 취소.'},
  {tag:'[글로벌] 환불 처리', content:'환불 수단: 결제 당시 동일 수단으로만 환불(다른 수단 불가). 카드/PayPal/AliPay: 약 1~2주 소요. WeChat Pay: 약 1주 소요. 해외 결제·주말·공휴일 포함 시 처리 기간 연장 가능. 환불 지연 시: ①카드사·결제사 내부 처리 지연 안내 ②승인 즉시 취소되어도 명세서 반영 1~7일 소요 ③USD 국제결제 환불은 국가별 처리시간 상이. 지속 지연 시 결제내역+주문번호 첨부 후 help@ticketbayglobal.com 문의.'},
  {tag:'[글로벌] 회원탈퇴/재가입/알림/1:1문의', content:'탈퇴: 거래 중 원칙적 불가, 탈퇴 후 취소 불가, 계정 복구 불가. 재가입 제한: 거래 이력 없음 7일, 거래 이력 있음 30일. 동일 ID 재가입 시 이전 정보 복구 불가. 알림: 결제완료·상품발송완료·PIN발송완료·거래완료·거래취소·거래Q&A·1:1문의 답변 시 발송. 1:1 문의 카테고리: 회원, 거래방법, 거래취소·신고·보류, 결제 및 환불, 배송, 서비스이용, 입장안심. 답변 보관 최대 6개월. 고객센터 매일 09:00~22:00 KST(점심 12~13시 중단), 명절 휴무. 공식 이메일: help@ticketbayglobal.com.'},
  {tag:'[글로벌] 티켓베이란/서비스 개요', content:'티켓베이는 온라인 중개 방식의 글로벌 C2C 티켓 거래 플랫폼. 공연·스포츠·축제 등 이벤트 티켓을 개인 간 안전하게 거래. 티켓 발급사가 아님. 주요 기능: 판매자 등록 티켓의 구매 중개, 이전 완료 전까지 결제금액 안전 보관(에스크로), 티켓 위조·중복·이전 불가 시 환불 또는 재발급, 티켓 이전 방식(모바일·PDF 등) 표준화, 행사 일정 변경·취소 시 정책에 따라 안내 및 환불, 거래 기록 검증 및 분쟁 해결 지원, 입장 보장 정책 운영.'},

(function migrateLegacy(){
  var oldKeys = ['tb_cx_kb','tb_cx_kb2','tb_cx_kb3','tb_cx_kb4','tb_cx_kb_v5','tb_cx_kb_v6','tb_cx_kb_v7','tb_cx_kb_v8','tb_cx_kb_v8_new_cs','tb_cx_kb_v9','tb_cx_kb_v10','tb_cx_kb_final','tb_cx_kb_final_v1','tb_cx_kb_v11'];
  var current = [];
  try{ current = JSON.parse(localStorage.getItem(KB_KEY)||'[]'); }catch(e){ current=[]; }
  var merged = current.slice();
  
  oldKeys.forEach(function(k){
    try{
      var old = JSON.parse(localStorage.getItem(k)||'[]');
      if(old.length){
        old.forEach(function(it){
          if(!merged.some(function(m){ return m.tag===it.tag && m.content===it.content; })){
            it.isBuiltin = false;
            merged.push(it);
          }
        });
      }
    }catch(e){}
  });
  if(merged.length !== current.length) localStorage.setItem(KB_KEY, JSON.stringify(merged));
})();

function getApiKey(){ return localStorage.getItem(API_KEY)||''; }
function saveApiKey(){ localStorage.setItem(API_KEY, document.getElementById('cfgInput').value.trim()); closeCfg(); }

function getKBItems(){ 
  try {
    var items = JSON.parse(localStorage.getItem(KB_KEY)||'[]'); 
    if(!items.some(function(it){ return it.isBuiltin; })) {
      BUILTIN.forEach(b => { items.push({tag: b.tag, content: b.content, isBuiltin: true}); });
      localStorage.setItem(KB_KEY, JSON.stringify(items));
    } else {
      var changed=false;
      // 신규 내장 항목 자동 추가
      BUILTIN.forEach(function(b){
        if(!items.some(function(it){ return it.tag===b.tag && it.isBuiltin; })){
          items.push({tag:b.tag, content:b.content, isBuiltin:true});
          changed=true;
        }
      });
      // 내장 항목 내용 동기화 (이메일 수정 등 반영)
      items.forEach(function(it){
        if(!it.isBuiltin) return;
        var match=BUILTIN.find(function(b){ return b.tag===it.tag; });
        if(match && it.content!==match.content){
          it.content=match.content;
          changed=true;
        }
      });
      if(changed) localStorage.setItem(KB_KEY, JSON.stringify(items));
    }
    return items;
  } catch(e) { return []; }
}
function saveKBItems(v){ localStorage.setItem(KB_KEY, JSON.stringify(v)); }

function detectLang(text){
  var jp=/[\u3040-\u309f\u30a0-\u30ff\u31f0-\u31ff]/;
  var zh=/[\u4e00-\u9fff]/;
  var en=/^[a-zA-Z0-9\s\.,;:!?\-'"()\[\]@#$%&*\/\\+={}<>~`]+$/;
  if((text.match(jp)||[]).length>=3) return 'ja';
  if((text.match(zh)||[]).length>=3 && (text.match(jp)||[]).length<2) return 'zh';
  if(en.test(text.trim())) return 'en';
  return 'ko';
}

function parseSteps(text){
  if(!text) return [];
  return text.replace(/\\n/g,'\n').split('\n').map(function(l,i){
    l=l.trim(); if(!l) return null;
    var p=l.split('|');
    if(p.length>=3) return {num:p[0].trim(),title:p[1].trim(),desc:p.slice(2).join(' ').trim()};
    if(p.length===2) return {num:p[0].trim(),title:'',desc:p[1].trim()};
    return {num:String(i+1),title:'',desc:l};
  }).filter(Boolean);
}

function parseReason(text){
  if(!text) return [''];
  return text.replace(/\\n/g,'\n').split('\n\n').map(function(p){ return p.split('\n').join(' ').trim(); }).filter(Boolean);
}

function getRelatedQuestions(id){
  var e = hist.find(function(x){ return x.id===id; });
  if(!e) return [];
  var results = [];
  var words = e.q.replace(/[?？]/g,'').split(/\s+/).filter(function(w){ return w.length>=2; });
  hist.filter(function(h){ return h.id!==id && h.result; }).forEach(function(h){
    if(words.some(function(w){ return h.q.indexOf(w)!==-1; }) && results.indexOf(h.q)===-1){
      results.push(h.q);
    }
  });
  var freq = getFreq();
  Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,8).forEach(function(kv){
    var suggest = QUICK_NORMAL.find(function(q){ return q.indexOf(kv[0])!==-1; });
    if(suggest && results.indexOf(suggest)===-1) results.push(suggest);
  });
  if(results.length < 3){
    QUICK_NORMAL.forEach(function(q){
      if(results.indexOf(q)===-1 && words.some(function(w){ return q.indexOf(w)!==-1; })) results.push(q);
    });
  }
  if(results.length < 3) QUICK_NORMAL.slice(0,3).forEach(function(q){ if(results.indexOf(q)===-1) results.push(q); });
  return results.slice(0,5);
}

// ── 마크다운 기호 제거 ── //
function cleanMd(text){
  if(!text) return text;
  return text
    .replace(/\*\*\*(.*?)\*\*\*/g,'$1')
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/^#{1,6}\s+/gm,'')
    .replace(/^---+$/gm,'')
    .replace(/^___+$/gm,'')
    .replace(/```[a-zA-Z]*\n?/g,'')
    .replace(/```/g,'')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/^\s*[-*]\s+/gm,'· ')
    .trim();
}

      groupsHtml += '<select class="kb-cat-select" onchange="moveKBCat('+o.i+',this.value,\''+tab+'\')" title="카테고리 이동">';
      cats.forEach(function(c){
        groupsHtml += '<option value="'+c+'"'+(getItemCat(o.it)===c?' selected':'')+'>'+c+'</option>';
      });
      groupsHtml += '</select>';
      groupsHtml += '<button onclick="moveKB('+o.i+', '+(!o.it.isBuiltin)+')" style="padding:2px 6px;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:#fff;font-size:10px;white-space:nowrap;">'+(o.it.isBuiltin?'⬇ 일반':'⬆ 내장')+'</button>';
      groupsHtml += '<button onclick="delKB('+o.i+')" style="padding:2px 6px;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:#fff;">✕</button>';
      groupsHtml += '</div></div>';
    });
    groupsHtml += '</div></div>';
  });

  if(!groupsHtml) groupsHtml = '<div style="padding:10px;color:#888;font-size:12px;">항목이 없습니다.</div>';

  el.innerHTML = tabsHtml + `
    <div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">카테고리 관리</div>
      <div class="kb-new-cat-row">
        <input class="kb-new-cat-inp" id="newCatInp" placeholder="새 카테고리명 (예: 🔥 분쟁/클레임)">
        <button class="kb-new-cat-btn" onclick="addNewCat()">추가</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px" id="catChips">
        ${cats.filter(function(c){return c!=='미분류';}).map(function(c){
          return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--g8);border:1px solid var(--border);border-radius:12px;font-size:10px;color:var(--g2);font-weight:500">'+c+'<button onclick="delCatConfirm(\''+c.replace(/'/g,"\\'")+'\')" style="border:none;background:none;cursor:pointer;font-size:10px;color:var(--g5);padding:0;line-height:1" title="삭제">✕</button></span>';
        }).join('')}

    <div class="kb-add" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
      <h3 style="font-size:13px; margin-bottom:8px; color:var(--black); font-weight:700;">+ 새 항목 직접 추가</h3>
      <select id="kbCatSel" style="width:100%; padding:8px; margin-bottom:5px; border:1.5px solid #ddd; border-radius:8px; font-family:inherit; font-size:12px;">
        ${cats.map(function(c){ return '<option value="'+c+'">'+c+'</option>'; }).join('')}

    </div>
  `;
}

// ★ 대량 추가 기능도 확실하게 공식 모델로 수정 ★
async function bulkParse(){
  var apiKey=getApiKey(); if(!apiKey){openCfg();return;}
  var text=document.getElementById('bulkTa').value.trim(); if(!text){alert('텍스트를 입력해주세요.');return;}
  var btn=document.getElementById('bulkBtn'); btn.disabled=true; btn.textContent='AI가 예쁘게 정리 중...';
  document.getElementById('bulkPreview').innerHTML='<div class="parsing-row"><span class="dots"><span></span><span></span><span></span></span> 마구잡이 텍스트를 깔끔하게 분류 중...</div>';
  
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':apiKey},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001', // <--- 여기도 공식 모델로 고쳤습니다.
        max_tokens:2000,
        system: '사용자의 긴 텍스트를 CX 지식베이스 항목으로 분리하세요. 무조건 순수 JSON 배열만 출력하세요. 형식: [{"tag":"주제 요약","content":"상세 내용 간결하게"}]',
        messages:[{role:'user',content:text.slice(0,3000)}]
      })
    });
    
    if(!res.ok) {
        var errText = await res.text();
        throw new Error("서버 연결 실패: " + errText);
    }
    
    var data=await res.json();
    var raw=data.content[0].text.trim();
    var si=raw.indexOf('['), ei=raw.lastIndexOf(']');
    var items=JSON.parse(raw.slice(si,ei+1));
    window._bulkParsed=items;
    
    var ph='<div style="font-size:12px;font-weight:700;color:var(--black);margin:10px 0 7px">🎉 '+items.length+'개 항목으로 예쁘게 정리했어요!</div>';
    items.forEach(function(it){ ph+='<div class="kb-item" style="margin-bottom:6px"><span class="kb-tag">'+it.tag+'</span><span class="kb-txt">'+it.content+'</span></div>'; });
    ph+='<button class="kb-save" style="margin-top:10px;width:100%;padding:10px;background:#000;color:#fff;border-radius:8px;border:none;font-weight:bold;cursor:pointer;" id="bulkSave" onclick="saveBulkItems()">이대로 모두 일반 항목에 저장하기</button>';
    document.getElementById('bulkPreview').innerHTML=ph;
  }catch(err){ 
    document.getElementById('bulkPreview').innerHTML='<div style="color:#ef4444;font-size:13px;padding:10px 0">분석 실패: '+err.message+'</div>'; 
  }
  btn.disabled=false; btn.textContent='✨ AI로 알아서 정리하기';
}

function saveBulkItems(){
  var kbItems=getKBItems();
  (window._bulkParsed||[]).forEach(function(it){ if(it.tag&&it.content) kbItems.push({tag:it.tag, content:it.content, isBuiltin: false}); });
  saveKBItems(kbItems); window._bulkParsed=null;
  alert('깔끔하게 저장됐습니다!'); renderKB('manual');
}

function addKB(isB){
  var t=document.getElementById('kbt').value.trim(), c=document.getElementById('kbc').value.trim();
  if(!t || !c) { alert('태그와 내용을 모두 입력하세요.'); return; }

function delKB(i){

    +'<div class="digest-attach" id="digestAttach"></div>'
    +'<div class="digest-actions">'
    +'<label class="digest-file-btn">📎 이미지 첨부<input type="file" accept="image/*" multiple style="display:none" onchange="handleDigestFiles(this.files)"></label>'
    +'<button class="digest-go-btn" id="digestGoBtn" onclick="submitDigest()">정리하기</button>'
    +'</div>'
    +'<div id="digestResult"></div>'
    +'</div>';
}

function handleDigestFiles(files){
  Array.from(files).forEach(function(file){
    if(digestImages.length>=10) return;
    var reader=new FileReader();
    reader.onload=function(e){
      digestImages.push({data:e.target.result, name:file.name, type:file.type});
      renderDigestThumbs();
    };
    reader.readAsDataURL(file);
  });
}
function removeDigestImg(idx){
  digestImages.splice(idx,1);
  renderDigestThumbs();
}
function renderDigestThumbs(){
  var el=document.getElementById('digestAttach'); if(!el) return;
  el.innerHTML=digestImages.map(function(img,i){
    return '<div class="digest-thumb"><img src="'+img.data+'"><button class="digest-thumb-del" onclick="removeDigestImg('+i+')">✕</button></div>';
  }).join('');
}

async function submitDigest(){
  var apiKey=getApiKey(); if(!apiKey){openCfg();return;}
  var taEl=document.getElementById('digestTa');
  var text=taEl?(taEl.value||'').trim():'';
  if(!text && !digestImages.length){alert('텍스트를 입력하거나 이미지를 첨부해 주세요.');return;}
  
  var btn=document.getElementById('digestGoBtn');
  if(btn){btn.disabled=true; btn.textContent='정리 중...';}
  var resultEl=document.getElementById('digestResult');
  if(resultEl) resultEl.innerHTML='<div class="cute-loader" style="margin-top:16px"><div class="cute-loader-icons"><span>📋</span><span>🔍</span><span>✍️</span></div><div class="cute-loader-text">케이스 정리 중...</div><div class="cute-loader-sub">사고 개요, 주문 현황, 결론을 정리하고 있습니다</div></div>';

  var sysP='당신은 티켓베이 CX 운영 관리자입니다. 슬랙 스레드나 거래 사고 내용을 받으면 요점 정리해 주세요. 반드시 순수 HTML 태그만 출력하세요. 절대 금지 사항: 마크다운 기호(#, **, ```, ---), 코드블록(```html 등), 백틱 기호를 절대 사용하지 마세요. h3, p, table, tr, th, td, div 태그만 사용하세요. 구성: 1) h3 사고 개요 - 3~5줄 p태그 요약. 2) h3 주문건별 현황 - 주문번호가 있으면 table로 정리(주문번호, 구매자, 상태 컬럼), 없으면 생략. 3) h3 결론 및 현재 결정사항 - p태그로 결정 사항 나열. 4) h3 추천 처리방안 - CX 관점 2~4가지 구체적 액션(과실 판단, 응대 방향, 에스컬레이션, 보상 범위). 5) div class=summary-line으로 한 줄 요약. 규칙: 사실만 정리, 추측 금지, 이름과 주문번호 원문 유지, 미정이면 보류 표기. 다시 한번 강조: 백틱이나 마크다운 기호를 쓰면 안 됩니다. 순수 HTML만 출력하세요.';

  try{
    var userMsg='아래 내용을 읽고 케이스를 정리해 주세요.\n\n'+text;

    if(digestImages.length > 0){
      // 이미지가 있으면 별도 처리
      var contentArr=[];
      for(var di=0;di<digestImages.length;di++){
        var parts=digestImages[di].data.split(',');
        contentArr.push({type:'image',source:{type:'base64',media_type:digestImages[di].type||'image/png',data:parts.length>1?parts[1]:parts[0]}});
      }
      contentArr.push({type:'text',text:text?'첨부 이미지의 내용을 읽고 케이스를 정리해 주세요.\n\n추가 텍스트:\n'+text:'첨부 이미지의 내용을 읽고 케이스를 정리해 주세요.'});
      
      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true', 'x-api-key': apiKey },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 3000,
          system: sysP,
          messages: [{ role: 'user', content: contentArr }]
        })
      });
    } else {
      // 텍스트만 - go() 함수와 100% 동일 패턴
      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true', 'x-api-key': apiKey },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 3000,
          system: sysP,
          messages: [{ role: 'user', content: userMsg }]
        })
      });
    }

    if(!res.ok) {
      var errText = await res.text();
      throw new Error("서버 응답 오류: " + errText);
    }

    var data = await res.json();
    var raw = '';
    for(var ci=0;ci<data.content.length;ci++){
      if(data.content[ci].type==='text') raw += data.content[ci].text;
    }
    if(!raw) throw new Error('AI 응답이 비어있습니다.');
    
    // 마크다운 코드블록 래핑 제거
    raw=raw.trim();
    raw=raw.replace(/^```[a-zA-Z]*\s*/,'').replace(/\s*```$/,'');
    raw=raw.replace(/^`+|`+$/g,'');
    raw=raw.trim();
    
    if(resultEl) resultEl.innerHTML='<div class="digest-result">'+raw+'</div>';

  }catch(err){
    if(resultEl) resultEl.innerHTML='<div class="error-card" style="word-break:break-all;line-height:1.8"><strong>정리 실패</strong><br>'+((err&&err.message)?err.message:String(err))+'</div>';
  }
  if(btn){btn.disabled=false; btn.textContent='정리하기';}
}




// ── 단순 해석 ── //
var trDir='toKo'; // toKo or fromKo
var trTargetLang='en';

function openTranslator(){
  activeId=null; activeTab=null;
  document.getElementById('navBack').style.display='';
  document.getElementById('navTitle').textContent='해석';
  trDir='toKo'; trTargetLang='en';
  var ra=document.getElementById('ra');
  ra.innerHTML='<div class="tr-wrap">'
    +'<div style="font-size:17px;font-weight:700;color:var(--black);margin-bottom:4px;letter-spacing:-.02em">🔤 해석</div>'
    +'<div style="font-size:12px;color:var(--g4);margin-bottom:16px;line-height:1.6">외국어 → 한국어, 한국어 → 외국어 단순 번역</div>'
    +'<div id="trBody"></div>'
    +'</div>';
  renderTranslator();
}

function renderTranslator(){
  var el=document.getElementById('trBody'); if(!el) return;
  var srcLabel, tgtLabel;
  if(trDir==='toKo'){
    srcLabel='🌏 원문 (영어/중국어/일본어)';
    tgtLabel='🇰🇷 한국어 해석';
  } else {
    srcLabel='🇰🇷 한국어 원문';
    tgtLabel=trTargetLang==='en'?'🇺🇸 English':trTargetLang==='zh'?'🇨🇳 中文':'🇯🇵 日本語';
  }

  var langBtns='';
  if(trDir==='fromKo'){
    langBtns='<div style="display:flex;gap:4px;margin-bottom:8px">'
      +'<button class="gcs-lang'+(trTargetLang==='en'?' on':'')+'" onclick="trTargetLang=\'en\';renderTranslator()" style="padding:4px 10px;font-size:11px">🇺🇸 EN</button>'
      +'<button class="gcs-lang'+(trTargetLang==='zh'?' on':'')+'" onclick="trTargetLang=\'zh\';renderTranslator()" style="padding:4px 10px;font-size:11px">🇨🇳 ZH</button>'
      +'<button class="gcs-lang'+(trTargetLang==='ja'?' on':'')+'" onclick="trTargetLang=\'ja\';renderTranslator()" style="padding:4px 10px;font-size:11px">🇯🇵 JA</button>'
      +'</div>';
  }

  el.innerHTML='<div class="tr-row">'
    +'<div class="tr-col">'
    +'<div class="tr-label"><span>'+srcLabel+'</span></div>'
    +'<textarea class="tr-ta" id="trSrc" placeholder="번역할 텍스트를 입력하세요..."></textarea>'
    +'</div>'
    +'<div class="tr-mid"><button class="tr-swap" onclick="swapTrDir()" title="방향 전환">⇄</button></div>'
    +'<div class="tr-col">'
    +'<div class="tr-label"><span>'+tgtLabel+'</span><button class="tr-copy" id="trCopyBtn" onclick="copyTrResult()">📋 복사</button></div>'
    +langBtns
    +'<textarea class="tr-ta" id="trTgt" readonly placeholder="번역 결과가 여기에 표시됩니다"></textarea>'
    +'</div>'
    +'</div>'
    +'<div class="tr-actions">'
    +'<button class="digest-go-btn" id="trGoBtn" onclick="submitTranslate()">해석하기</button>'
    +'</div>';
}

function swapTrDir(){
  trDir=(trDir==='toKo')?'fromKo':'toKo';
  renderTranslator();
}

function copyTrResult(){
  var el=document.getElementById('trTgt'); if(!el||!el.value) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(el.value).then(function(){
      var btn=document.getElementById('trCopyBtn');
      if(btn){btn.textContent='완료!';setTimeout(function(){btn.textContent='📋 복사';},1200);}
    });
  } else {
    el.select();document.execCommand('copy');
    var btn=document.getElementById('trCopyBtn');
    if(btn){btn.textContent='완료!';setTimeout(function(){btn.textContent='📋 복사';},1200);}
  }
}

async function submitTranslate(){
  var apiKey=getApiKey(); if(!apiKey){openCfg();return;}
  var srcEl=document.getElementById('trSrc');
  var text=srcEl?(srcEl.value||'').trim():'';
  if(!text){alert('번역할 텍스트를 입력하세요.');return;}

  var btn=document.getElementById('trGoBtn');
  var tgtEl=document.getElementById('trTgt');
  if(btn){btn.disabled=true;btn.textContent='해석 중...';}
  if(tgtEl) tgtEl.value='해석 중...';

  var sysMsg;
  if(trDir==='toKo'){
    sysMsg='아래 텍스트를 한국어로 자연스럽게 번역해 주세요. 번역문만 출력하세요. 설명, 마크다운, 백틱, 코드블록 절대 금지.';
  } else {
    var tName=trTargetLang==='en'?'영어(English)':trTargetLang==='zh'?'중국어 간체(简体中文)':'일본어(日本語)';
    sysMsg='아래 한국어 텍스트를 '+tName+'로 자연스럽게 번역해 주세요. 번역문만 출력하세요. 설명, 마크다운, 백틱, 코드블록 절대 금지.';
  }

  try{
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true', 'x-api-key': apiKey },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        system: sysMsg,
        messages: [{ role: 'user', content: text }]
      })
    });
    if(!res.ok){var errText=await res.text();throw new Error(errText);}
    var data=await res.json();
    var raw='';
    for(var ci=0;ci<data.content.length;ci++){
      if(data.content[ci].type==='text') raw+=data.content[ci].text;
    }
    raw=raw.trim().replace(/^```[a-zA-Z]*\s*/,'').replace(/\s*```$/,'').replace(/^`+|`+$/g,'').trim();
    if(tgtEl) tgtEl.value=raw;
  }catch(err){
    if(tgtEl) tgtEl.value='해석 실패: '+((err&&err.message)?err.message:String(err));
  }
  if(btn){btn.disabled=false;btn.textContent='해석하기';}
}

if(getApiKey()) { document.getElementById('apiNavBtn').style.opacity='1'; }
renderHome();
